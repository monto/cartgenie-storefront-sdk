name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      - run: npm pack --dry-run

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Skips itself when the secrets are not configured (the suite is env-gated).
      - run: npm run test:smoke
        env:
          CARTGENIE_SMOKE_BASE_URL: ${{ secrets.CARTGENIE_SMOKE_BASE_URL }}
          CARTGENIE_SMOKE_API_KEY: ${{ secrets.CARTGENIE_SMOKE_API_KEY }}
